name: Build Electron App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

jobs:
  build-electron:
    name: Build Windows Installer & Portable EXE
    runs-on: windows-latest

    defaults:
      run:
        working-directory: electron-app

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron-app/package-lock.json

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build (skip code-signing — no certificate needed) ────────────────
      - name: Build Electron app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # disables code-signing lookup
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # needed by electron-builder
        run: npm run dist

      # ── 5. List output so we know what was produced ─────────────────────────
      - name: List dist output
        run: Get-ChildItem -Recurse dist | Select-Object FullName, Length

      # ── 6. Upload NSIS installer (.exe setup) ───────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebIDE-Setup-Windows-x64
          path: electron-app/dist/*.exe
          if-no-files-found: warn
          retention-days: 30

      # ── 7. Upload unpacked folder (portable, no install needed) ─────────────
      - name: Upload portable (unpacked) artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebIDE-Portable-Windows-x64
          path: electron-app/dist/win-unpacked/
          if-no-files-found: warn
          retention-days: 30
