name: Build Electron App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-electron:
    name: Build Windows ZIP (portable)
    runs-on: windows-latest

    defaults:
      run:
        working-directory: electron-app

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 4. Build — unsigned ZIP (no code-signing needed) ────────────────────
      - name: Build Electron app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      # ── 5. List output ───────────────────────────────────────────────────────
      - name: List dist output
        run: Get-ChildItem -Recurse dist | Select-Object FullName, Length

      # ── 6. Upload ZIP artifact ───────────────────────────────────────────────
      - name: Upload WebIDE ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebIDE-Windows-x64
          path: electron-app/dist/*.zip
          if-no-files-found: error
          retention-days: 30

